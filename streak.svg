<svg width="495" height="130" viewBox="0 0 495 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .label { font: 400 11px 'Segoe UI', Ubuntu, sans-serif; fill: #8b949e; }
      .big-num { font: 700 36px 'Segoe UI', Ubuntu, sans-serif; fill: #21c55d; }
      .mid-num { font: 700 22px 'Segoe UI', Ubuntu, sans-serif; fill: #e6edf3; }
      .section-title { font: 600 11px 'Segoe UI', Ubuntu, sans-serif; fill: #58a6ff; letter-spacing: 1px; }
    </style>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#21c55d" stroke-width="0.1" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="495" height="130" rx="10" class="bg"/>
  <rect width="495" height="130" rx="10" fill="url(#grid2)"/>
  <rect width="495" height="130" rx="10" class="border"/>

  <!-- Left accent -->
  <rect x="0" y="20" width="3" height="50" rx="1.5" fill="#21c55d" opacity="0.6"/>

  <!-- Left: Total contributions -->
  <text x="247" y="26" text-anchor="middle" class="section-title">TOTAL CONTRIBUTIONS</text>
  <text x="247" y="26" text-anchor="middle" class="section-title" x="82">THIS YEAR</text>

  <text x="82" y="22" text-anchor="middle" class="section-title">TOTAL CONTRIBUTIONS</text>
  <text x="82" y="68" text-anchor="middle" class="big-num">412</text>
  <text x="82" y="85" text-anchor="middle" class="label">Jan 1, 2026 – Today</text>

  <!-- Center divider -->
  <line x1="165" y1="18" x2="165" y2="112" stroke="#21262d" stroke-width="1"/>

  <!-- Center: Current streak -->
  <text x="247" y="22" text-anchor="middle" class="section-title">CURRENT STREAK</text>
  <!-- Fire emoji approximation -->
  <text x="247" y="66" text-anchor="middle" font-family="serif" font-size="20" fill="#f97316">🔥</text>
  <text x="247" y="62" text-anchor="middle" class="big-num" dy="20">128</text>
  <text x="247" y="95" text-anchor="middle" class="label">Mar 6 – Apr 12</text>

  <!-- Right divider -->
  <line x1="330" y1="18" x2="330" y2="112" stroke="#21262d" stroke-width="1"/>

  <!-- Right: Longest streak -->
  <text x="412" y="22" text-anchor="middle" class="section-title">LONGEST STREAK</text>
  <text x="412" y="68" text-anchor="middle" class="big-num">128</text>
  <text x="412" y="85" text-anchor="middle" class="label">Mar 6 – Apr 12</text>

  <!-- Bottom bar -->
  <line x1="18" y1="112" x2="477" y2="112" stroke="#21262d" stroke-width="1"/>
  <text x="247" y="123" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="9" fill="#3d444d">github.com/anjaya02 · 2026</text>
</svg>
